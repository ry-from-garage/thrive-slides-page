<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1600 480" role="img" aria-labelledby="title desc">
  <title id="title">thrive-slides banner option 5 - Input to Deck Pipeline</title>
  <desc id="desc">README banner showing text, markdown, and PDF flowing through the slide system into a finished deck.</desc>
  <defs>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19D8FF"/>
      <stop offset="100%" stop-color="#26E6A6"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5B55"/>
      <stop offset="100%" stop-color="#F5B84B"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#093A30"/>
      <stop offset="100%" stop-color="#32D39B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C76A"/>
      <stop offset="100%" stop-color="#D99716"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#06111F" flood-opacity=".18"/>
    </filter>
    <pattern id="grid8" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#FFFFFF" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <pattern id="dotgrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#19D8FF" opacity=".32"/>
    </pattern>
    <style>
      .word { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 760; letter-spacing: 0; }
      .mono { font-family: "SF Mono", "Roboto Mono", ui-monospace, monospace; font-weight: 650; letter-spacing: 0; }
      .displayMono { font-family: "PT Mono", "Courier New", Courier, ui-monospace, monospace; font-weight: 700; letter-spacing: 0; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 650; letter-spacing: 0; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 560; letter-spacing: 0; }
      
    </style>
  </defs>

  <rect width="1600" height="480" fill="#F8FAFC"/>
  <g transform="translate(96 114)">
    <text class="displayMono" x="0" y="0" fill="#071A2E" font-size="72">thrive-slides</text>
    <rect x="4" y="37" width="92" height="10" fill="#19D8FF"/>
    <text class="small" x="0" y="88" fill="#607285" font-size="27">text / Markdown / PDF → theme-aware 16:9 decks</text>
  </g>
  <g transform="translate(94 238)">

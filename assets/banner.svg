      <rect x="16" y="16" width="94" height="94" rx="16" fill="#EF594C"/>
      <path d="M42 62l34-34 28 28-34 34z" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linejoin="round"/>
      <text class="small" x="22" y="160" fill="#607285" font-size="20">Brand</text>
    </g>
    <g transform="translate(630 0)">
      <rect x="0" y="0" width="126" height="126" rx="22" fill="#E5F1FF" stroke="#ACD4FF"/>
      <rect x="16" y="16" width="94" height="94" rx="16" fill="#2688E9"/>
      <path d="M63 34l11 25 25 11-25 11-11 25-11-25-25-11 25-11z" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linejoin="round"/>

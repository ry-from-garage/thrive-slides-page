    <text class="displayMono" x="12" y="203" fill="#EF594C" font-size="24">PDF</text>
    <path d="M78 32H132M78 112H132M78 192H132M132 32V192M132 85H202" fill="none" stroke="#071A2E" stroke-width="4" stroke-dasharray="8 10" stroke-linecap="square"/>

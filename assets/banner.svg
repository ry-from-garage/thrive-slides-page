    </g>
    <g transform="translate(210 0)">
      <rect x="0" y="0" width="126" height="126" rx="22" fill="#E4F8EF" stroke="#A6EACB"/>
      <rect x="16" y="16" width="94" height="94" rx="16" fill="#23AD76"/>
      <circle cx="63" cy="63" r="30" fill="#FFFFFF"/>
      <circle cx="52" cy="53" r="6" fill="#23AD76"/><circle cx="72" cy="52" r="6" fill="#23AD76"/><circle cx="78" cy="72" r="6" fill="#23AD76"/><circle cx="55" cy="76" r="6" fill="#23AD76"/>
      <text class="small" x="20" y="160" fill="#607285" font-size="20">Theme</text>
    </g>
    <g transform="translate(420 0)">
